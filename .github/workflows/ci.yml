name: Book QA

on:
  pull_request:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Markdown links
        run: python scripts/check_links.py

      - name: Check exercise labels
        run: python scripts/check_exercise_labels.py

      - name: Check exercise/solution mappings
        run: python scripts/check_exercise_solution_mapping.py

      - name: Run pytest
        run: python -m pytest

      - name: Run legacy smoke test
        run: python examples/python/tests.py

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1.314.0
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build --source docs --config docs/_config.yml --destination _site
        env:
          JEKYLL_ENV: production
          PAGES_REPO_NWO: itdojp/theoretical-computer-science-prerequisites-book
