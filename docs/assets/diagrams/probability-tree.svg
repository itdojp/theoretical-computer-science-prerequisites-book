<svg xmlns="http://www.w3.org/2000/svg" width="900" height="340" viewBox="0 0 900 340">
  <rect width="100%" height="100%" fill="#fff"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#333"/></marker></defs>
  <text x="30" y="35" font-size="22" font-family="sans-serif">条件付き確率は確率木で追跡する</text>
  <g stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="120" y1="170" x2="300" y2="100"/><line x1="120" y1="170" x2="300" y2="240"/>
    <line x1="330" y1="100" x2="560" y2="70"/><line x1="330" y1="100" x2="560" y2="130"/>
    <line x1="330" y1="240" x2="560" y2="210"/><line x1="330" y1="240" x2="560" y2="270"/>
  </g>
  <g font-family="sans-serif" font-size="15" fill="#111">
    <text x="180" y="115">P(A)</text><text x="180" y="235">P(¬A)</text>
    <text x="420" y="65">P(B|A)</text><text x="420" y="135">P(¬B|A)</text>
    <text x="410" y="205">P(B|¬A)</text><text x="405" y="278">P(¬B|¬A)</text>
    <text x="590" y="75">P(A∩B)=P(A)P(B|A)</text>
    <text x="590" y="215">P(¬A∩B)=P(¬A)P(B|¬A)</text>
    <text x="80" y="315">枝を進むと掛け算、同じ事象に到達する枝は足し算。</text>
  </g>
</svg>
