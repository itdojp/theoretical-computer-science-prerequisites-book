<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="30" y="35" font-size="22" font-family="sans-serif">BFS は距離ごとに層を広げる</text>
  <g stroke="#555" stroke-width="2" fill="none">
    <line x1="120" y1="200" x2="260" y2="120"/><line x1="120" y1="200" x2="260" y2="280"/>
    <line x1="260" y1="120" x2="430" y2="90"/><line x1="260" y1="120" x2="430" y2="170"/>
    <line x1="260" y1="280" x2="430" y2="250"/><line x1="260" y1="280" x2="430" y2="330"/>
    <line x1="430" y1="170" x2="610" y2="190"/><line x1="430" y1="250" x2="610" y2="190"/>
  </g>
  <g font-family="sans-serif" font-size="16" stroke="#333" stroke-width="2" fill="#f8f8f8">
    <circle cx="120" cy="200" r="28"/><text x="112" y="206" fill="#111" stroke="none">s</text>
    <circle cx="260" cy="120" r="28"/><text x="252" y="126" fill="#111" stroke="none">a</text>
    <circle cx="260" cy="280" r="28"/><text x="252" y="286" fill="#111" stroke="none">b</text>
    <circle cx="430" cy="90" r="28"/><text x="422" y="96" fill="#111" stroke="none">c</text>
    <circle cx="430" cy="170" r="28"/><text x="422" y="176" fill="#111" stroke="none">d</text>
    <circle cx="430" cy="250" r="28"/><text x="422" y="256" fill="#111" stroke="none">e</text>
    <circle cx="430" cy="330" r="28"/><text x="422" y="336" fill="#111" stroke="none">f</text>
    <circle cx="610" cy="190" r="28"/><text x="602" y="196" fill="#111" stroke="none">g</text>
  </g>
  <g font-family="sans-serif" font-size="15" fill="#333">
    <text x="90" y="255">距離0</text><text x="230" y="355">距離1</text><text x="395" y="385">距離2</text><text x="585" y="250">距離3</text>
    <text x="65" y="85">キュー: [s] → [a,b] → [b,c,d] → ...</text>
    <text x="65" y="115">最初に取り出された時点で、始点からの最短距離が確定する。</text>
  </g>
</svg>
