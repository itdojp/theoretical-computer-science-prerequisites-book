<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="30" y="35" font-size="22" font-family="sans-serif">Hamming 距離: 同じ長さの語で異なる位置の個数</text>
  <g font-family="monospace" font-size="34" fill="#111">
    <text x="95" y="110">1 0 1 1 0 1 0</text>
    <text x="95" y="170">1 1 1 0 0 1 1</text>
  </g>
  <g stroke="#333" stroke-width="2" font-family="sans-serif" font-size="18" fill="#111">
    <line x1="170" y1="120" x2="170" y2="150"/><text x="160" y="220">差</text>
    <line x1="322" y1="120" x2="322" y2="150"/><text x="312" y="220">差</text>
    <line x1="552" y1="120" x2="552" y2="150"/><text x="542" y="220">差</text>
  </g>
  <text x="95" y="260" font-size="16" font-family="sans-serif">距離は 3。誤り訂正符号では最小距離が検出・訂正能力を決める。</text>
</svg>
