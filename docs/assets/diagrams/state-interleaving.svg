<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <rect width="100%" height="100%" fill="#fff"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#333"/></marker></defs>
  <text x="30" y="35" font-size="22" font-family="sans-serif">並行実行: インターリーブで状態空間が分岐する</text>
  <g stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="120" y1="170" x2="300" y2="100"/><line x1="120" y1="170" x2="300" y2="240"/>
    <line x1="330" y1="100" x2="520" y2="170"/><line x1="330" y1="240" x2="520" y2="170"/>
    <line x1="550" y1="170" x2="740" y2="170"/>
  </g>
  <g font-family="sans-serif" font-size="15" stroke="#333" stroke-width="2" fill="#f8f8f8">
    <rect x="60" y="135" width="120" height="70" rx="8"/><text x="83" y="165" fill="#111" stroke="none">x=0</text><text x="83" y="187" fill="#111" stroke="none">start</text>
    <rect x="270" y="65" width="120" height="70" rx="8"/><text x="292" y="95" fill="#111" stroke="none">P: read</text><text x="292" y="117" fill="#111" stroke="none">x=0</text>
    <rect x="270" y="205" width="120" height="70" rx="8"/><text x="292" y="235" fill="#111" stroke="none">Q: read</text><text x="292" y="257" fill="#111" stroke="none">x=0</text>
    <rect x="500" y="135" width="120" height="70" rx="8"/><text x="522" y="165" fill="#111" stroke="none">both read</text><text x="522" y="187" fill="#111" stroke="none">x=0</text>
    <rect x="720" y="135" width="120" height="70" rx="8"/><text x="742" y="165" fill="#111" stroke="none">write/write</text><text x="742" y="187" fill="#111" stroke="none">x=1?</text>
  </g>
  <text x="73" y="302" font-size="15" font-family="sans-serif">非原子的な read-modify-write は、逐次実行と同じ結果になるとは限らない。</text>
</svg>
