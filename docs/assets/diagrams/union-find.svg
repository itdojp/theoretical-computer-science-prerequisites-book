<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <rect width="100%" height="100%" fill="#fff"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#333"/></marker></defs>
  <text x="30" y="35" font-size="22" font-family="sans-serif">Union-Find: 代表元で集合を管理する</text>
  <g stroke="#555" stroke-width="2" marker-end="url(#arrow)">
    <line x1="170" y1="110" x2="110" y2="190"/><line x1="170" y1="110" x2="230" y2="190"/>
    <line x1="590" y1="110" x2="530" y2="190"/><line x1="590" y1="110" x2="650" y2="190"/>
    <line x1="590" y1="110" x2="710" y2="190"/>
  </g>
  <g font-family="sans-serif" font-size="17" stroke="#333" stroke-width="2" fill="#f8f8f8">
    <circle cx="170" cy="100" r="28"/><text x="163" y="106" fill="#111" stroke="none">1</text>
    <circle cx="110" cy="210" r="28"/><text x="103" y="216" fill="#111" stroke="none">2</text>
    <circle cx="230" cy="210" r="28"/><text x="223" y="216" fill="#111" stroke="none">3</text>
    <circle cx="590" cy="100" r="28"/><text x="583" y="106" fill="#111" stroke="none">4</text>
    <circle cx="530" cy="210" r="28"/><text x="523" y="216" fill="#111" stroke="none">5</text>
    <circle cx="650" cy="210" r="28"/><text x="643" y="216" fill="#111" stroke="none">6</text>
    <circle cx="710" cy="210" r="28"/><text x="703" y="216" fill="#111" stroke="none">7</text>
  </g>
  <text x="80" y="285" font-size="15" font-family="sans-serif">find(3)=1</text><text x="500" y="285" font-size="15" font-family="sans-serif">find(7)=4</text>
  <text x="80" y="320" font-size="15" font-family="sans-serif">union(3,7) は代表元 1 と 4 を併合する操作。</text>
</svg>
