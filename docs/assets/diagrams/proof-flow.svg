<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333" />
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#fff"/>
  <text x="30" y="35" font-size="22" font-family="sans-serif">証明を書くときの基本フロー</text>
  <g font-family="sans-serif" font-size="15" stroke="#333" fill="#f8f8f8">
    <rect x="40" y="80" width="130" height="70" rx="10"/>
    <text x="62" y="112">定義を展開</text><text x="61" y="134">記号を日本語化</text>
    <rect x="220" y="80" width="130" height="70" rx="10"/>
    <text x="239" y="112">仮定を列挙</text><text x="241" y="134">使える条件</text>
    <rect x="400" y="80" width="130" height="70" rx="10"/>
    <text x="420" y="112">目標を分解</text><text x="421" y="134">示すべき式</text>
    <rect x="580" y="80" width="130" height="70" rx="10"/>
    <text x="604" y="112">手法を選択</text><text x="603" y="134">直接/対偶/帰納</text>
    <rect x="760" y="80" width="100" height="70" rx="10"/>
    <text x="781" y="112">結論</text><text x="776" y="134">定義へ戻す</text>
  </g>
  <g stroke="#333" stroke-width="2" marker-end="url(#arrow)">
    <line x1="170" y1="115" x2="220" y2="115"/>
    <line x1="350" y1="115" x2="400" y2="115"/>
    <line x1="530" y1="115" x2="580" y2="115"/>
    <line x1="710" y1="115" x2="760" y2="115"/>
  </g>
  <g font-family="sans-serif" font-size="14" fill="#333">
    <text x="70" y="210">例: 「R が同値関係」なら</text>
    <text x="70" y="235">反射律・対称律・推移律をそれぞれ個別に示す。</text>
    <text x="70" y="260">例を複数確認しても証明ではない。任意の要素に対して定義から示す。</text>
  </g>
</svg>
