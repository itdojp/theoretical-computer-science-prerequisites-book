<svg xmlns="http://www.w3.org/2000/svg" width="900" height="330" viewBox="0 0 900 330">
  <rect width="100%" height="100%" fill="#fff"/>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#333"/></marker></defs>
  <text x="30" y="35" font-size="22" font-family="sans-serif">ループ不変条件による正しさ証明</text>
  <g stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="110" y1="160" x2="260" y2="160"/>
    <line x1="410" y1="160" x2="560" y2="160"/>
    <path d="M635 130 C720 70, 720 250, 635 190"/>
  </g>
  <g font-family="sans-serif" font-size="15" stroke="#333" stroke-width="2" fill="#f8f8f8">
    <rect x="45" y="125" width="120" height="70" rx="8"/><text x="72" y="155" fill="#111" stroke="none">初期化</text><text x="65" y="177" fill="#111" stroke="none">I が真</text>
    <rect x="260" y="125" width="150" height="70" rx="8"/><text x="292" y="155" fill="#111" stroke="none">反復前</text><text x="282" y="177" fill="#111" stroke="none">I ∧ 条件</text>
    <rect x="560" y="125" width="150" height="70" rx="8"/><text x="592" y="155" fill="#111" stroke="none">反復後</text><text x="582" y="177" fill="#111" stroke="none">I が保存</text>
    <rect x="740" y="125" width="120" height="70" rx="8"/><text x="758" y="155" fill="#111" stroke="none">終了時</text><text x="752" y="177" fill="#111" stroke="none">I ∧ ¬条件</text>
  </g>
  <line x1="710" y1="160" x2="740" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="70" y="275" font-size="15" font-family="sans-serif">正しさ = 初期化 + 保存 + 終了時に目的が従う、の3点で示す。</text>
</svg>
