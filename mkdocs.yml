site_name: 理論計算機科学を読むための数学・証明・アルゴリズム基礎
site_description: 集合・論理から確率・数論・形式モデルまで
site_author: ITDO Inc.（株式会社アイティードゥ）
site_url: https://itdojp.github.io/theoretical-computer-science-prerequisites-book/
repo_url: https://github.com/itdojp/theoretical-computer-science-prerequisites-book
repo_name: itdojp/theoretical-computer-science-prerequisites-book
edit_uri: edit/main/docs/

docs_dir: docs

# v1.0 では MkDocs Material、CI品質ゲート、研修運用ドキュメント、正式公開監査を想定する。
# 依存関係は requirements.txt を参照。
theme:
  name: material
  language: ja
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search:
      lang: ja

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  generator: false

nav:
  - Home: index.md
  - 前提診断: diagnosis.md
  - 学習ルート: learning-path.md
  - Core:
      - 第1章 集合と論理: part-1-core/01-sets-logic.md
      - 第2章 関数と関係: part-1-core/02-functions-relations.md
      - 第3章 証明技法: part-1-core/03-proofs.md
      - 第4章 漸近記法: part-1-core/04-asymptotic-notation.md
      - 第5章 擬似コードと再帰: part-1-core/05-pseudocode-recursion.md
  - Standard:
      - 第6章 グラフと木: part-2-standard/06-graphs-trees.md
      - 第7章 組合せと数え上げ: part-2-standard/07-counting.md
      - 第8章 データ構造と基本アルゴリズム: part-2-standard/08-data-structures.md
      - 第9章 形式言語の入口: part-2-standard/09-formal-language-primer.md
  - Extended:
